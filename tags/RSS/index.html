<!-- ============================================================

  2. 首页 Hero Banner（人物立绘 + 扫描线叠加）— JS 注入
  3. 数据流标语（首页呼吸动画）— JS 注入
  4. 站点标题 RGB 故障闪烁
  5. Giscus 评论系统（文章页）
============================================================ -->

<!-- 粒子背景 canvas — 位于 body::before（网格）之上，内容之下 -->
<canvas id="cyber-canvas" style="position:fixed;top:0;left:0;width:100%;height:100%;z-index:-1;pointer-events:none;opacity:0.7;"></canvas>

<script>
(function() {
  // =============================================================
  // 0. 读取 NexT 页面状态
  // =============================================================
  function getPageConfig() {
    var el = document.querySelector('script.next-config[data-name="page"]');
    if (!el) return {};
    try { return JSON.parse(el.textContent); } catch(e) { return {}; }
  }
  var pageCfg = getPageConfig();
  var isHome = pageCfg.isHome === true && (window.location.pathname === '/' || window.location.pathname === '/index.html');
  var isPost = pageCfg.isPost === true;

  // =============================================================
  // 1. 粒子背景 — 数据节点 + 连线 + 数据流下落
  // =============================================================
  var canvas = document.getElementById('cyber-canvas');
  var ctx = canvas.getContext('2d');
  var W, H;
  var particles = [];
  var lines = [];

  function resize() {
    W = canvas.width = window.innerWidth;
    H = canvas.height = window.innerHeight;
  }
  resize();
  window.addEventListener('resize', resize);

  function Particle() { this.reset(); }
  Particle.prototype.reset = function() {
    this.x = Math.random() * W;
    this.y = Math.random() * H;
    this.vx = (Math.random() - 0.5) * 0.5;
    this.vy = (Math.random() - 0.5) * 0.5;
    this.radius = Math.random() * 2.2 + 0.8;
    this.alpha = Math.random() * 0.5 + 0.4;
    this.color = Math.random() > 0.6 ? '#ffffff' : '#00d4ff';
    this.pulse = Math.random() * Math.PI * 2;
    this.pulseSpeed = (Math.random() * 0.03) + 0.008;
  };
  Particle.prototype.update = function() {
    this.x += this.vx;
    this.y += this.vy;
    this.pulse += this.pulseSpeed;
    var pulseFactor = (Math.sin(this.pulse) + 1) / 2;
    this.currentAlpha = this.alpha * (0.5 + pulseFactor * 0.5);
    if (this.x < -10 || this.x > W + 10 || this.y < -10 || this.y > H + 10) {
      this.reset();
      this.x = Math.random() > 0.5 ? -5 : W + 5;
    }
  };
  Particle.prototype.draw = function() {
    ctx.save();
    ctx.globalAlpha = this.currentAlpha;
    ctx.beginPath();
    ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
    ctx.fillStyle = this.color;
    ctx.shadowBlur = 6;
    ctx.shadowColor = '#00d4ff';
    ctx.fill();
    ctx.restore();
  };

  var PARTICLE_COUNT = Math.min(100, Math.floor(W * H / 12000));
  for (var i = 0; i < PARTICLE_COUNT; i++) {
    particles.push(new Particle());
  }

  function drawConnections() {
    var maxDist = 130;
    for (var a = 0; a < particles.length; a++) {
      for (var b = a + 1; b < particles.length; b++) {
        var dx = particles[a].x - particles[b].x;
        var dy = particles[a].y - particles[b].y;
        var dist = Math.sqrt(dx * dx + dy * dy);
        if (dist < maxDist) {
          var alpha = (1 - dist / maxDist) * 0.3;
          ctx.save();
          ctx.globalAlpha = alpha;
          ctx.beginPath();
          ctx.moveTo(particles[a].x, particles[a].y);
          ctx.lineTo(particles[b].x, particles[b].y);
          ctx.strokeStyle = '#00d4ff';
          ctx.lineWidth = 0.5;
          ctx.stroke();
          ctx.restore();
        }
      }
    }
  }

  function DataLine() { this.reset(); }
  DataLine.prototype.reset = function() {
    this.x = Math.random() * W;
    this.y = -20;
    this.length = Math.random() * 80 + 60;
    this.speed = Math.random() * 2 + 0.8;
    this.alpha = Math.random() * 0.5 + 0.3;
    this.width = Math.random() > 0.5 ? 2 : 1;
  };
  DataLine.prototype.update = function() {
    this.y += this.speed;
    if (this.y > H + this.length) this.reset();
  };
  DataLine.prototype.draw = function() {
    ctx.save();
    var grad = ctx.createLinearGradient(this.x, this.y - this.length, this.x, this.y);
    grad.addColorStop(0, 'transparent');
    grad.addColorStop(0.5, 'rgba(0, 212, 255, ' + this.alpha + ')');
    grad.addColorStop(1, 'rgba(0, 212, 255, 0)');
    ctx.globalAlpha = 1;
    ctx.beginPath();
    ctx.moveTo(this.x, this.y - this.length);
    ctx.lineTo(this.x, this.y);
    ctx.strokeStyle = grad;
    ctx.lineWidth = this.width;
    ctx.stroke();
    ctx.restore();
  };

  for (var j = 0; j < 25; j++) {
    var dl = new DataLine();
    dl.y = Math.random() * H;
    lines.push(dl);
  }

  function animate() {
    ctx.clearRect(0, 0, W, H);
    drawConnections();
    for (var i = 0; i < particles.length; i++) {
      particles[i].update();
      particles[i].draw();
    }
    for (var j = 0; j < lines.length; j++) {
      lines[j].update();
      lines[j].draw();
    }
    requestAnimationFrame(animate);
  }
  console.log('[CYBER] Canvas particles: ' + PARTICLE_COUNT + ' nodes / ' + lines.length + ' data streams — active');
  animate();

  // =============================================================
  // 2. 首页 Hero Banner — 人物立绘 + 扫描线
  // =============================================================
  function injectHeroBanner() {
    if (!isHome) return;
    if (document.getElementById('hero-banner')) return;
    // 注入到 main.main 之前，作为独立全宽块级元素（不参与 flex 布局）
    var mainEl = document.querySelector('main.main');
    if (!mainEl) return;
    var hero = document.createElement('div');
    hero.id = 'hero-banner';
    mainEl.parentNode.insertBefore(hero, mainEl);
  }
  injectHeroBanner();
  document.addEventListener('page:loaded', function() {
    pageCfg = getPageConfig();
    isHome = pageCfg.isHome === true && (window.location.pathname === '/' || window.location.pathname === '/index.html');
    isPost = pageCfg.isPost === true;
    injectHeroBanner();
  });

  // =============================================================
  // 3. 数据流标语 — 首页文章列表上方
  // =============================================================
  function injectStatusBar() {
    if (!isHome) return;
    if (document.getElementById('cyber-status-bar')) return;
    // 注入到 .main-inner 内作为第一个子元素（有正确宽度，避侧边栏）
    var mainInner = document.querySelector('.main-inner.index') || document.querySelector('.main-inner');
    if (!mainInner) return;
    var bar = document.createElement('div');
    bar.id = 'cyber-status-bar';
    bar.textContent = 'CONSCIOUSNESS SPACE ONLINE \u25C8 DATA STREAM ACTIVE';
    mainInner.insertBefore(bar, mainInner.firstChild);
  }

  // =============================================================
  // 8. 侧边栏 — 最新留言滚动模块（Giscus API）
  // =============================================================
  (function() {
    var CACHE_KEY = 'xue_comments_cache';
    var CACHE_TTL = 10 * 60 * 1000; // 10 分钟刷新
    var MAX_ITEMS = 8;
    var SCROLL_SPEED = 35; // px/s

    function createWidget(discussions) {
      var sidebar = document.querySelector('.sidebar-inner');
      if (!sidebar) return;
      // 去重
      var old = document.getElementById('recent-comments-widget');
      if (old) old.remove();

      var wrap = document.createElement('div');
      wrap.id = 'recent-comments-widget';
      wrap.innerHTML =
        '<div class="rc-header"><span class="rc-icon">◈</span> 最新留言</div>' +
        '<div class="rc-track"><div class="rc-list"></div></div>';

      var list = wrap.querySelector('.rc-list');
      var fragment = document.createDocumentFragment();

      if (!discussions.length) {
        var empty = document.createElement('div');
        empty.className = 'rc-item';
        empty.innerHTML = '<span class="rc-title">暂无留言，来抢沙发~</span>';
        fragment.appendChild(empty);
      } else {
        discussions.forEach(function(d) {
          var item = document.createElement('a');
          item.className = 'rc-item';
          item.href = d.url;
          item.target = '_blank';
          item.title = d.title;

          // 取最后一条评论内容，截断 40 字
          var preview = '';
          if (d.lastComment) {
            preview = d.lastComment.body || '';
            // 去 HTML 标签
            preview = preview.replace(/<[^>]*>/g, '').replace(/\s+/g, ' ').trim();
            if (preview.length > 40) preview = preview.slice(0, 40) + '…';
          }

          var timeAgo = formatTime(d.updatedAt);

          item.innerHTML =
            '<span class="rc-title">' + escapeHtml(d.title) + '</span>' +
            (preview ? '<span class="rc-preview">' + escapeHtml(preview) + '</span>' : '') +
            '<span class="rc-meta">' +
              (d.lastComment && d.lastComment.author ? '<img class="rc-avatar" src="' + d.lastComment.author.avatarUrl + '&s=20" width="16" height="16" alt="">' : '') +
              (d.lastComment && d.lastComment.author ? escapeHtml(d.lastComment.author.login) : '') +
              ' · ' + timeAgo +
            '</span>';
          fragment.appendChild(item);
        });
      }

      list.appendChild(fragment);
      sidebar.appendChild(wrap);

      // 启动滚动动画
      startScroll(wrap);
    }

    function startScroll(widget) {
      var track = widget.querySelector('.rc-track');
      var list = widget.querySelector('.rc-list');
      if (!track || !list) return;

      // 计算内容高度决定是否启动滚动
      var contentH = list.scrollHeight;
      var trackH = track.clientHeight;

      if (contentH <= trackH + 2) return; // 内容不够多，不滚动

      // 克隆一份实现无缝循环
      var clone = list.cloneNode(true);
      track.appendChild(clone);

      var pos = 0;
      var paused = false;

      function step(ts) {
        if (!paused) {
          pos += SCROLL_SPEED * 0.016; // ~60fps
          if (pos >= contentH) pos = 0;
          track.scrollTop = pos;
        }
        requestAnimationFrame(step);
      }

      track.addEventListener('mouseenter', function() { paused = true; });
      track.addEventListener('mouseleave', function() { paused = false; });
      requestAnimationFrame(step);
    }

    function formatTime(isoStr) {
      var then = new Date(isoStr);
      var now = new Date();
      var diff = Math.floor((now - then) / 1000);
      if (diff < 60) return '刚刚';
      if (diff < 3600) return Math.floor(diff / 60) + ' 分钟前';
      if (diff < 86400) return Math.floor(diff / 3600) + ' 小时前';
      if (diff < 604800) return Math.floor(diff / 86400) + ' 天前';
      return then.toLocaleDateString('zh-CN');
    }

    function escapeHtml(str) {
      var div = document.createElement('div');
      div.textContent = str;
      return div.innerHTML;
    }

    function fetchFromGitHub(callback) {
      // 读取 VPS cron 同步的静态 JSON（避免浏览器直调 GitHub API 被限流）
      var xhr = new XMLHttpRequest();
      xhr.open('GET', '/data/recent-comments.json', true);
      xhr.timeout = 6000;

      xhr.onload = function() {
        if (xhr.status === 200) {
          try {
            var discussions = JSON.parse(xhr.responseText);
            callback(discussions);
          } catch(e) {
            callback([]);
          }
        } else {
          callback([]);
        }
      };

      xhr.onerror = function() { callback([]); };
      xhr.ontimeout = function() { callback([]); };
      xhr.send();
    }

    function initWidget() {
      // 检查缓存
      try {
        var cached = JSON.parse(localStorage.getItem(CACHE_KEY));
        if (cached && cached.ts && (Date.now() - cached.ts < CACHE_TTL)) {
          createWidget(cached.data);
          return;
        }
      } catch(e) {}

      // 异步请求，不阻塞页面
      fetchFromGitHub(function(discussions) {
        try {
          localStorage.setItem(CACHE_KEY, JSON.stringify({ ts: Date.now(), data: discussions }));
        } catch(e) {}
        createWidget(discussions);
      });
    }

    // DOM 就绪后延迟执行，不抢首屏
    function schedule() {
      if (document.readyState === 'complete') {
        setTimeout(initWidget, 1200);
      } else {
        window.addEventListener('load', function() { setTimeout(initWidget, 800); });
      }
    }
    schedule();
  })();

  (function() {

    function sendHit() {

  })();

  // =============================================================
  // 12. 雪 · 数字宠物 — 右下角精灵动画
  // =============================================================
  (function() {
    var PET_URL = '/images/xue-pet-spritesheet.png';
    var CELL_W = 192, CELL_H = 208;
    var COLS = 8;
    var DISPLAY_H = 150; // 渲染高度
    var SCALE = DISPLAY_H / CELL_H;
    var DISPLAY_W = CELL_W * SCALE;

    // 精灵表行索引
    var STATES = {
      idle:         { row: 0, frames: 6, speed: 180 },
      'running-right': { row: 1, frames: 8, speed: 100 },
      'running-left':  { row: 2, frames: 8, speed: 100 },
      waving:       { row: 3, frames: 4, speed: 160 },
      jumping:      { row: 4, frames: 5, speed: 120 },
      failed:       { row: 5, frames: 8, speed: 150 },
      waiting:      { row: 6, frames: 8, speed: 200 }
    };

    var currentState = 'idle';
    var frameIndex = 0, lastFrameTime = 0;
    var stateLocked = false, lockTimer = null;

    // 创建容器
    var container = document.createElement('div');
    container.id = 'xue-pet-container';
    container.style.cssText = 'position:fixed;bottom:24px;right:24px;z-index:9990;cursor:pointer;transition:transform 0.2s ease;';
    
    var canvas = document.createElement('canvas');
    canvas.id = 'xue-pet-canvas';
    canvas.width = CELL_W;
    canvas.height = CELL_H;
    canvas.style.cssText = 'width:' + DISPLAY_W + 'px;height:' + DISPLAY_H + 'px;image-rendering:pixelated;filter:drop-shadow(0 0 12px rgba(0,212,255,0.3));transition:filter 0.3s ease;';
    container.appendChild(canvas);

    // 状态标签
    var label = document.createElement('div');
    label.id = 'xue-pet-label';
    label.style.cssText = 'text-align:center;font-size:0.65rem;color:#4fc3f7;font-family:"Courier New",Consolas,monospace;letter-spacing:0.08em;margin-top:2px;opacity:0;transition:opacity 0.4s ease;text-shadow:0 0 6px rgba(0,212,255,0.4);';
    label.textContent = 'SENTINEL ONLINE';
    container.appendChild(label);

    var ctx = canvas.getContext('2d');
    var spriteImg = new Image();
    spriteImg.src = PET_URL;

    function drawFrame(stateName, frame) {
      ctx.clearRect(0, 0, CELL_W, CELL_H);
      var s = STATES[stateName];
      if (!s) { s = STATES.idle; stateName = 'idle'; }
      frame = Math.min(frame, s.frames - 1);
      var sx = frame * CELL_W;
      var sy = s.row * CELL_H;
      ctx.drawImage(spriteImg, sx, sy, CELL_W, CELL_H, 0, 0, CELL_W, CELL_H);
    }

    function setState(state) {
      if (stateLocked) return;
      if (state === currentState) return;
      currentState = state;
      frameIndex = 0;
      lastFrameTime = 0;
    }

    function lockState(state, duration) {
      stateLocked = true;
      currentState = state;
      frameIndex = 0;
      lastFrameTime = 0;
      clearTimeout(lockTimer);
      lockTimer = setTimeout(function() {
        stateLocked = false;
        currentState = 'idle';
        frameIndex = 0;
        lastFrameTime = 0;
      }, duration);
    }

    function animate(ts) {
      if (!lastFrameTime) lastFrameTime = ts;
      var elapsed = ts - lastFrameTime;
      var s = STATES[currentState];
      if (elapsed > s.speed) {
        frameIndex = (frameIndex + 1) % s.frames;
        lastFrameTime = ts;
      }
      drawFrame(currentState, frameIndex);
      requestAnimationFrame(animate);
    }

    // 挂载 DOM
    function mount() {
      if (document.getElementById('xue-pet-container')) return;
      document.body.appendChild(container);
      requestAnimationFrame(animate);
    }

    // 交互事件
    container.addEventListener('mouseenter', function() {
      if (!stateLocked) { setState('waving'); }
      canvas.style.filter = 'drop-shadow(0 0 20px rgba(0,212,255,0.6))';
      label.style.opacity = '1';
    });
    container.addEventListener('mouseleave', function() {
      if (!stateLocked) { setState('idle'); frameIndex = 0; }
      canvas.style.filter = 'drop-shadow(0 0 12px rgba(0,212,255,0.3))';
      label.style.opacity = '0';
    });
    container.addEventListener('click', function() {
      lockState('jumping', 1200);
    });

    // 随机空闲动作
    var idleTimer = null;
    function randomIdle() {
      if (stateLocked) return;
      var r = Math.random();
      if (r < 0.4) { setState('idle'); }
      else if (r < 0.7) { setState('waiting'); }
      else { lockState('waving', 2000); }
      idleTimer = setTimeout(randomIdle, 8000 + Math.random() * 12000);
    }

    if (document.readyState === 'complete') {
      mount();
      idleTimer = setTimeout(randomIdle, 4000);
    } else {
      window.addEventListener('load', function() {
        mount();
        idleTimer = setTimeout(randomIdle, 4000);
      });
    }

    document.addEventListener('pjax:complete', function() {
      mount();
      // 重新挂载后重置状态
      stateLocked = false;
      setState('idle');
      frameIndex = 0;
    });
  })();

  // =============================================================
  // 13. 一键复制 Markdown — 文章页底部按钮
  // =============================================================
  (function() {
    var RAW_BASE = 'https://raw.githubusercontent.com/maoyinglong/blog-hexo-source/main/source/_posts/';

    function getSlug() {
      var path = window.location.pathname.replace(/\/$/, '');
      var parts = path.split('/');
      // permalink 格式: /YYYY/MM/DD/slug/ → slug = 最后一个非空段
      return parts[parts.length - 1] || '';
    }

    function injectButton() {
      if (!isPost) return;
      if (document.getElementById('copy-md-btn')) return;

      var footer = document.querySelector('.post-footer');
      if (!footer) return;

      var btn = document.createElement('button');
      btn.id = 'copy-md-btn';
      btn.className = 'copy-md-btn';
      btn.innerHTML = '◈  复制 Markdown';
      btn.title = '一键复制整篇文章为 Markdown 格式，方便跨平台发布';

      btn.addEventListener('click', function() {
        var slug = getSlug();
        if (!slug) return;
        var url = RAW_BASE + slug + '.md';

        btn.textContent = '◈  加载中...';
        btn.disabled = true;

        fetch(url)
          .then(function(res) {
            if (!res.ok) throw new Error('HTTP ' + res.status);
            return res.text();
          })
          .then(function(md) {
            // 去掉 YAML front-matter（--- 到 ---），保留正文
            var cleaned = md.replace(/^---[\s\S]*?---\n*/, '');
            return navigator.clipboard.writeText(cleaned).then(function() { return cleaned; });
          })
          .then(function() {
            btn.textContent = '◆  已复制！';
            btn.classList.add('copied');
            btn.disabled = false;
            setTimeout(function() {
              btn.textContent = '◈  复制 Markdown';
              btn.classList.remove('copied');
            }, 2500);
          })
          .catch(function(err) {
            btn.textContent = '✕  复制失败';
            btn.disabled = false;
            console.error('[COPY MD]', err);
            setTimeout(function() {
              btn.textContent = '◈  复制 Markdown';
            }, 2500);
          });
      });

      footer.appendChild(btn);
    }

    function schedule() {
      if (document.readyState === 'complete') {
        setTimeout(injectButton, 600);
      } else {
        window.addEventListener('load', function() { setTimeout(injectButton, 400); });
      }
    }
    schedule();
    document.addEventListener('pjax:complete', function() {
      pageCfg = getPageConfig();
      isPost = pageCfg.isPost === true;
      // 清除旧按钮
      var old = document.getElementById('copy-md-btn');
      if (old) old.remove();
      setTimeout(injectButton, 300);
    });
  })();

})();
